# pyrefly.toml - Pyrefly linter configuration for Smooth Trans backend

# Point Pyrefly at the virtual environment so it can resolve all installed packages.
python_interpreter_path = "./venv/Scripts/python.exe"

# Add the parent directory of backend (..) to search_path so the backend package can be imported.
search_path = [".", ".."]

# Exclude Pyrefly's own virtual inmemory scratch files from error reporting.
# These files (e.g. __pyrefly_virtual__/inmemory/*.py) are code-completion
# snippets analyzed out of context and always produce false-positive errors.
[errors]
exclude = [
    "c:/__pyrefly_virtual__/**",
    "__pyrefly_virtual__/**",
]
