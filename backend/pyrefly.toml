# pyrefly.toml - Pyrefly linter configuration for Smooth Trans backend

# Point Pyrefly at the virtual environment interpreter so it can resolve installed packages.
python-interpreter-path = "./venv/Scripts/python.exe"

# Add the parent directory (..) to search-path so the backend package can be imported as backend.*
search-path = [".", ".."]

# Exclude virtual scratch files from error reporting.
project-excludes = [
    "c:/__pyrefly_virtual__/**",
    "__pyrefly_virtual__/**"
]
